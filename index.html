<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090b">
<title>Tiven Labs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>tailwind.config={theme:{extend:{colors:{bg:'#09090b',surface:'#18181b',border:'#27272a',muted:'#71717a'}}}}</script>
<style>
html{background:#09090b;color:#fafafa;font-family:system-ui,-apple-system,sans-serif;overscroll-behavior:none}
body{margin:0;padding:0;padding-bottom:env(safe-area-inset-bottom,0)}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease-out}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s infinite}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
.slide-up{animation:slideUp .3s ease-out}
button:active{transform:scale(0.97)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#09090b}
::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:2px}
.kanban-col{min-height:200px}
.card-enter{animation:fadeIn .3s ease-out}
@media(max-width:640px){.hide-mobile{display:none}}
</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef} = React;

// ── Config ──
const PAPERCLIP_HOST = 'https://paperclip-1gza.srv1377312.hstgr.cloud';
const API_BASE = location.hostname.includes('srv1377312') && location.port !== '3200' ? '' : PAPERCLIP_HOST;
const COMPANY_ID = '49ce8674-6087-4558-b196-99f678d3ee41';
const AGENTS = {
  '5425b0a6-051d-4cc5-a86b-e47021a983a9': {name:'Matt Ingram',role:'CEO',short:'CEO'},
  'a2f98d0f-7cb8-4370-805e-71d71b513d4e': {name:'Debra Reacher',role:'Deep Researcher',short:'Research'},
  'f49f3229-340a-4584-9428-91fa9422546e': {name:'Samantha Jennings',role:'ASO Monitor',short:'ASO'},
  '78cc6468-746c-4f78-9a47-fb54d3096862': {name:'Gabby Samson',role:'Gap Scanner',short:'Scanner'},
  'ae6d8682-1a10-4c95-af27-28860ab9d0ac': {name:'Reva Harper',role:'Reviewer',short:'QA'},
  '28911c32-b396-4223-8092-249ca3a10666': {name:'Robert Winters',role:'Report Writer',short:'Writer'},
  '27089fdb-5654-4c38-b814-18cc25545f70': {name:'Dash Micheals',role:'Dashboard Manager',short:'Dash'},
  '51b1ef44-5ccb-4726-8d47-6f2939a89c63': {name:'Tara Voss',role:'X Content',short:'X'},
  'eae61a82-7f4d-4f4a-96c6-fdde7f673388': {name:'Kyle Navarro',role:'Reddit Scout',short:'Reddit'},
};
const CEO_ID = '5425b0a6-051d-4cc5-a86b-e47021a983a9';
const PORTFOLIO = [
  {name:'Kova',desc:'GRE & SAT Vocabulary',price:'$0.99',model:'One-time + $0.99 packs'},
  {name:'Gratuiti',desc:'Tip Calculator',price:'$1.99 pro',model:'Free + one-time pro'},
  {name:'RecipeScaler',desc:'Recipe Scaling + OCR',price:'$1.99 pro',model:'Free + one-time pro'},
  {name:'Trades-Calc',desc:'Construction Calculators',price:'$9.99 core',model:'Free + IAP packs'},
];

// ── API Layer ──
// Session token stored in localStorage after first successful auth
function getSessionToken(){return localStorage.getItem('paperclip_session')}
function setSessionToken(t){localStorage.setItem('paperclip_session',t)}

async function api(path, opts={}){
  const url = `${API_BASE}/api/companies/${COMPANY_ID}${path}`;
  const headers = {'Content-Type':'application/json',...(opts.headers||{})};
  // When cross-origin, use cookie header; same-origin uses credentials
  const fetchOpts = API_BASE ? {
    ...opts,
    headers,
    credentials:'include',
  } : {
    ...opts,
    headers,
    credentials:'include',
  };
  const res = await fetch(url, fetchOpts);
  if(res.status===403){
    // Auth failed — prompt for login
    const ok = await doLogin();
    if(ok) return api(path, opts); // retry
    throw new Error('Authentication required');
  }
  if(!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}
async function apiMutate(path, body){
  return api(path, {method:'POST',body:JSON.stringify(body)});
}
async function doLogin(){
  const email = prompt('Paperclip email:');
  if(!email) return false;
  const password = prompt('Paperclip password:');
  if(!password) return false;
  try{
    const res = await fetch(`${API_BASE}/api/auth/sign-in/email`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body:JSON.stringify({email,password})
    });
    if(res.ok){
      const data = await res.json();
      if(data.token) setSessionToken(data.token);
      return true;
    }
    alert('Login failed');
    return false;
  }catch(e){alert('Login error: '+e.message);return false}
}

// ── Helpers ──
const agentName = id => AGENTS[id]?.name || 'Unassigned';
const agentShort = id => AGENTS[id]?.short || '?';
const timeAgo = d => {if(!d)return'--';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d'};
const statusColor = s => ({todo:'bg-zinc-800 text-zinc-400 border-zinc-600',in_progress:'bg-sky-900/60 text-sky-400 border-sky-700',in_review:'bg-amber-900/60 text-amber-400 border-amber-700',done:'bg-emerald-900/60 text-emerald-400 border-emerald-700',blocked:'bg-red-900/60 text-red-400 border-red-700',cancelled:'bg-zinc-800 text-zinc-500 border-zinc-700'}[s]||'bg-zinc-800 text-zinc-400 border-zinc-600');
const priorityIcon = p => ({critical:'!!!',high:'!!',medium:'!',low:''}[p]||'');
const statusDot = s => ({idle:'bg-zinc-600',running:'bg-emerald-500 pulse',error:'bg-red-500'}[s]||'bg-zinc-600');

function Badge({text,cls}){return <span className={`inline-block px-2 py-0.5 text-xs font-semibold rounded border ${cls} whitespace-nowrap`}>{text}</span>}

// ── Data Hook ──
function useData(){
  const [issues,setIssues]=useState([]);
  const [agents,setAgents]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [lastRefresh,setLastRefresh]=useState(null);

  const refresh = useCallback(async()=>{
    try{
      const [iss,ags]=await Promise.all([api('/issues'),api('/agents')]);
      setIssues(iss);
      setAgents(ags);
      setLastRefresh(new Date());
      setError(null);
    }catch(e){setError(e.message)}
    finally{setLoading(false)}
  },[]);

  useEffect(()=>{refresh();const t=setInterval(refresh,30000);return()=>clearInterval(t)},[refresh]);
  return {issues,agents,loading,error,lastRefresh,refresh};
}

// ── Toast ──
function Toast({msg,type='success',onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t)},[]);
  const cls = type==='success'?'bg-emerald-900 text-emerald-200 border-emerald-700':'bg-red-900 text-red-200 border-red-700';
  return <div className={`fixed top-4 left-1/2 -translate-x-1/2 ${cls} px-6 py-3 rounded-lg border z-50 text-sm font-medium slide-up`}>{msg}</div>;
}

// ── Issue Detail Modal ──
function IssueModal({issue,onClose,onAction}){
  const [comments,setComments]=useState([]);
  const [loadingComments,setLoadingComments]=useState(true);

  useEffect(()=>{
    api(`/issues/${issue.identifier}/comments`).then(c=>{
      setComments(Array.isArray(c)?c:c.comments||[]);
      setLoadingComments(false);
    }).catch(()=>setLoadingComments(false));
  },[issue.identifier]);

  return(
    <div className="fixed inset-0 bg-black/80 z-50 flex items-end sm:items-center justify-center" onClick={onClose}>
      <div className="bg-surface w-full sm:max-w-2xl sm:rounded-xl rounded-t-xl max-h-[90vh] overflow-y-auto border border-border slide-up" onClick={e=>e.stopPropagation()}>
        <div className="sticky top-0 bg-surface border-b border-border p-4 flex justify-between items-start z-10">
          <div className="flex-1 min-w-0 pr-3">
            <div className="flex items-center gap-2 mb-1">
              <span className="mono text-xs text-muted">{issue.identifier}</span>
              <Badge text={issue.status} cls={statusColor(issue.status)}/>
              {issue.priority && issue.priority!=='medium' && <Badge text={issue.priority} cls={issue.priority==='high'||issue.priority==='critical'?'bg-red-900/60 text-red-400 border-red-700':'bg-zinc-800 text-zinc-400 border-zinc-600'}/>}
            </div>
            <h2 className="font-semibold text-base leading-tight">{issue.title}</h2>
          </div>
          <button onClick={onClose} className="text-muted text-2xl leading-none p-2 -mr-2 -mt-1">&times;</button>
        </div>

        <div className="p-4 space-y-4">
          <div className="flex flex-wrap gap-3 text-xs text-muted">
            <span>Assigned: <span className="text-zinc-300">{agentName(issue.assigneeAgentId)}</span></span>
            <span>Created: <span className="text-zinc-300">{timeAgo(issue.createdAt)} ago</span></span>
            {issue.completedAt && <span>Done: <span className="text-zinc-300">{timeAgo(issue.completedAt)} ago</span></span>}
          </div>

          {issue.description && <div className="bg-zinc-900 rounded-lg p-4 text-sm text-zinc-300 whitespace-pre-wrap leading-relaxed">{issue.description}</div>}

          <div className="flex gap-2 flex-wrap">
            {issue.status==='todo' && <button onClick={()=>onAction('start',issue)} className="px-4 py-3 text-sm rounded-lg bg-sky-900/60 text-sky-300 border border-sky-700 font-medium min-h-[48px]">Start</button>}
            {(issue.status==='in_progress'||issue.status==='in_review') && <button onClick={()=>onAction('done',issue)} className="px-4 py-3 text-sm rounded-lg bg-emerald-900/60 text-emerald-300 border border-emerald-700 font-medium min-h-[48px]">Complete</button>}
            {issue.status!=='cancelled'&&issue.status!=='done' && <button onClick={()=>onAction('cancel',issue)} className="px-4 py-3 text-sm rounded-lg bg-red-900/60 text-red-300 border border-red-700 font-medium min-h-[48px]">Cancel</button>}
          </div>

          <div>
            <h3 className="text-sm font-semibold text-muted mb-3">Comments {comments.length>0&&`(${comments.length})`}</h3>
            {loadingComments && <div className="text-muted text-sm">Loading...</div>}
            {!loadingComments && comments.length===0 && <div className="text-muted text-sm">No comments yet</div>}
            <div className="space-y-3">
              {comments.map((c,i)=>(
                <div key={c.id||i} className="bg-zinc-900 rounded-lg p-3 border border-border">
                  <div className="flex justify-between text-xs text-muted mb-2">
                    <span className="font-medium text-zinc-400">{agentName(c.agentId||c.createdByAgentId)}</span>
                    <span>{timeAgo(c.createdAt)} ago</span>
                  </div>
                  <div className="text-sm text-zinc-300 whitespace-pre-wrap leading-relaxed break-words">{c.body}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Issue Card (compact) ──
function IssueCard({issue,onClick}){
  const age = timeAgo(issue.createdAt);
  const isUrgent = issue.priority==='critical'||issue.priority==='high';
  return(
    <div onClick={()=>onClick(issue)} className={`bg-surface rounded-lg border ${isUrgent?'border-red-900/50':'border-border'} p-3 cursor-pointer active:bg-zinc-800 transition-colors card-enter`}>
      <div className="flex justify-between items-start gap-2 mb-1">
        <span className="mono text-xs text-muted">{issue.identifier}</span>
        <div className="flex items-center gap-1.5">
          {isUrgent && <span className="text-red-400 text-xs font-bold">{priorityIcon(issue.priority)}</span>}
          <Badge text={issue.status} cls={statusColor(issue.status)}/>
        </div>
      </div>
      <div className="font-medium text-sm leading-snug mb-2">{issue.title}</div>
      <div className="flex justify-between text-xs text-muted">
        <span>{agentShort(issue.assigneeAgentId)}</span>
        <span>{age}</span>
      </div>
    </div>
  );
}

// ── TAB: Inbox ──
function InboxView({issues,onSelect,onAction}){
  const inbox = useMemo(()=>{
    const active = issues.filter(i=>i.status==='in_progress'||i.status==='in_review');
    const todo = issues.filter(i=>i.status==='todo');
    const recentDone = issues.filter(i=>i.status==='done').sort((a,b)=>new Date(b.completedAt||b.updatedAt)-new Date(a.completedAt||a.updatedAt)).slice(0,10);
    return {active,todo,recentDone};
  },[issues]);

  return(
    <div className="space-y-6 fade-in">
      {inbox.active.length>0 && <Section title={`Active (${inbox.active.length})`} color="text-sky-400">
        <div className="space-y-2">{inbox.active.map(i=><IssueCard key={i.id} issue={i} onClick={onSelect}/>)}</div>
      </Section>}

      {inbox.todo.length>0 && <Section title={`Todo (${inbox.todo.length})`} color="text-zinc-400">
        <div className="space-y-2">{inbox.todo.map(i=><IssueCard key={i.id} issue={i} onClick={onSelect}/>)}</div>
      </Section>}

      <Section title="Recently Completed" color="text-emerald-400">
        {inbox.recentDone.length===0?<div className="text-muted text-sm">Nothing yet</div>:
        <div className="space-y-2">{inbox.recentDone.map(i=><IssueCard key={i.id} issue={i} onClick={onSelect}/>)}</div>}
      </Section>
    </div>
  );
}

// ── TAB: Pipeline (Kanban) ──
function PipelineView({issues,onSelect}){
  const columns = useMemo(()=>{
    const cols = {
      todo:{label:'Scouted',color:'text-zinc-400',items:[]},
      in_progress:{label:'Researching',color:'text-sky-400',items:[]},
      in_review:{label:'Validated',color:'text-amber-400',items:[]},
      done:{label:'Complete',color:'text-emerald-400',items:[]},
    };
    // Only show research/validation issues in pipeline, not meta tasks
    const pipeline = issues.filter(i=>
      i.status!=='cancelled' && (
        i.title.toLowerCase().includes('validate') ||
        i.title.toLowerCase().includes('gap scan') ||
        i.title.toLowerCase().includes('aso') ||
        i.title.toLowerCase().includes('reddit') ||
        i.title.toLowerCase().includes('research') ||
        i.title.toLowerCase().includes('build') ||
        i.title.toLowerCase().includes('position') ||
        i.title.toLowerCase().includes('capture') ||
        i.title.toLowerCase().includes('investigate') ||
        i.title.toLowerCase().includes('evaluate')
      )
    );
    pipeline.forEach(i=>{
      const col = cols[i.status];
      if(col) col.items.push(i);
    });
    // Sort: in_progress by startedAt, todo by createdAt, done by completedAt desc
    cols.todo.items.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    cols.in_progress.items.sort((a,b)=>new Date(a.startedAt||a.createdAt)-new Date(b.startedAt||b.createdAt));
    cols.done.items.sort((a,b)=>new Date(b.completedAt||b.updatedAt)-new Date(a.completedAt||a.updatedAt));
    cols.done.items = cols.done.items.slice(0,15); // cap done items
    return cols;
  },[issues]);

  return(
    <div className="fade-in">
      {/* Mobile: stacked */}
      <div className="sm:hidden space-y-6">
        {Object.entries(columns).map(([key,col])=>(
          <Section key={key} title={`${col.label} (${col.items.length})`} color={col.color}>
            {col.items.length===0?<div className="text-muted text-xs py-4">Empty</div>:
            <div className="space-y-2">{col.items.map(i=><IssueCard key={i.id} issue={i} onClick={onSelect}/>)}</div>}
          </Section>
        ))}
      </div>
      {/* Desktop: horizontal kanban */}
      <div className="hidden sm:grid sm:grid-cols-4 gap-4">
        {Object.entries(columns).map(([key,col])=>(
          <div key={key} className="kanban-col">
            <div className={`text-sm font-semibold ${col.color} mb-3 flex justify-between`}>
              <span>{col.label}</span>
              <span className="text-muted font-normal">{col.items.length}</span>
            </div>
            <div className="space-y-2">
              {col.items.map(i=><IssueCard key={i.id} issue={i} onClick={onSelect}/>)}
              {col.items.length===0 && <div className="text-muted text-xs py-8 text-center border border-dashed border-border rounded-lg">Empty</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── TAB: Portfolio ──
function PortfolioView({issues,onSelect}){
  const appIssues = useCallback((appName)=>{
    return issues.filter(i=>i.title.toLowerCase().includes(appName.toLowerCase()) && i.status!=='cancelled')
      .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  },[issues]);

  const [expandedApp,setExpandedApp]=useState(null);

  return(
    <div className="space-y-4 fade-in">
      {PORTFOLIO.map(app=>{
        const related = appIssues(app.name);
        const active = related.filter(i=>i.status==='in_progress'||i.status==='todo');
        const done = related.filter(i=>i.status==='done');
        const isOpen = expandedApp===app.name;
        return(
          <div key={app.name} className="bg-surface rounded-xl border border-border overflow-hidden">
            <div className="p-4 cursor-pointer active:bg-zinc-800 transition-colors" onClick={()=>setExpandedApp(isOpen?null:app.name)}>
              <div className="flex justify-between items-center">
                <div>
                  <div className="font-bold text-lg">{app.name}</div>
                  <div className="text-xs text-muted">{app.desc}</div>
                </div>
                <div className="text-right">
                  <div className="mono text-lg font-bold text-emerald-400">{app.price}</div>
                  <div className="text-xs text-muted">{app.model}</div>
                </div>
              </div>
              <div className="flex gap-4 mt-3 text-xs">
                <span className="text-sky-400">{active.length} active</span>
                <span className="text-emerald-400">{done.length} done</span>
                <span className="text-muted">{related.length} total</span>
              </div>
            </div>
            {isOpen && <div className="border-t border-border p-4 space-y-2 fade-in">
              {related.length===0 && <div className="text-muted text-sm">No issues for this app yet</div>}
              {related.slice(0,20).map(i=><IssueCard key={i.id} issue={i} onClick={onSelect}/>)}
            </div>}
          </div>
        );
      })}
    </div>
  );
}

// ── TAB: Agents ──
function AgentsView({agents:liveAgents,issues,onSelect}){
  const agentList = useMemo(()=>{
    return liveAgents.map(a=>{
      const myIssues = issues.filter(i=>i.assigneeAgentId===a.id && i.status!=='cancelled');
      const active = myIssues.filter(i=>i.status==='in_progress');
      const todo = myIssues.filter(i=>i.status==='todo');
      const done = myIssues.filter(i=>i.status==='done');
      return {...a,myIssues,active,todo,done};
    }).sort((a,b)=>{
      // CEO first, then running agents, then by name
      if(a.role==='ceo') return -1;
      if(b.role==='ceo') return 1;
      if(a.status==='running'&&b.status!=='running') return -1;
      if(b.status==='running'&&a.status!=='running') return 1;
      return a.name.localeCompare(b.name);
    });
  },[liveAgents,issues]);

  const [expandedAgent,setExpandedAgent]=useState(null);

  return(
    <div className="space-y-3 fade-in">
      {agentList.map(a=>{
        const isOpen = expandedAgent===a.id;
        return(
          <div key={a.id} className="bg-surface rounded-xl border border-border overflow-hidden">
            <div className="p-4 cursor-pointer active:bg-zinc-800 transition-colors" onClick={()=>setExpandedAgent(isOpen?null:a.id)}>
              <div className="flex items-center gap-3">
                <div className={`w-3 h-3 rounded-full shrink-0 ${statusDot(a.status)}`}/>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold">{a.name}</div>
                  <div className="text-xs text-muted">{a.title}</div>
                </div>
                <div className="text-right text-xs">
                  <div className={a.status==='running'?'text-emerald-400 font-semibold':'text-muted'}>{a.status}</div>
                  <div className="text-muted">{a.active.length} active / {a.todo.length} todo</div>
                </div>
              </div>
            </div>
            {isOpen && <div className="border-t border-border p-4 space-y-2 fade-in">
              {a.active.length>0 && <div className="text-xs text-sky-400 font-semibold mb-2">Active</div>}
              {a.active.map(i=><IssueCard key={i.id} issue={i} onClick={onSelect}/>)}
              {a.todo.length>0 && <div className="text-xs text-zinc-400 font-semibold mb-2 mt-3">Todo</div>}
              {a.todo.map(i=><IssueCard key={i.id} issue={i} onClick={onSelect}/>)}
              {a.done.length>0 && <div className="text-xs text-emerald-400 font-semibold mb-2 mt-3">Recent ({a.done.length})</div>}
              {a.done.slice(0,5).map(i=><IssueCard key={i.id} issue={i} onClick={onSelect}/>)}
              {a.active.length===0&&a.todo.length===0&&a.done.length===0 && <div className="text-muted text-sm">No issues assigned</div>}
            </div>}
          </div>
        );
      })}
    </div>
  );
}

// ── TAB: Money ──
function MoneyView({issues}){
  const stats = useMemo(()=>{
    const total = issues.length;
    const done = issues.filter(i=>i.status==='done').length;
    const active = issues.filter(i=>i.status==='in_progress').length;
    const todo = issues.filter(i=>i.status==='todo').length;
    const cancelled = issues.filter(i=>i.status==='cancelled').length;
    return {total,done,active,todo,cancelled};
  },[issues]);

  return(
    <div className="space-y-6 fade-in">
      <div className="grid grid-cols-2 gap-3">
        <StatCard label="Portfolio Apps" value="4" sub="Shipped"/>
        <StatCard label="Pipeline Items" value={stats.active+stats.todo} sub="Active + Todo"/>
        <StatCard label="Completed" value={stats.done} sub={`of ${stats.total} total`}/>
        <StatCard label="Completion Rate" value={stats.total?Math.round(stats.done/stats.total*100)+'%':'--'} sub="Issues closed"/>
      </div>

      <Section title="Portfolio Pricing" color="text-emerald-400">
        <div className="space-y-2">
          {PORTFOLIO.map(app=>(
            <div key={app.name} className="bg-surface rounded-lg border border-border p-4 flex justify-between items-center">
              <div>
                <div className="font-semibold">{app.name}</div>
                <div className="text-xs text-muted">{app.desc}</div>
              </div>
              <div className="text-right">
                <div className="mono text-lg font-bold text-emerald-400">{app.price}</div>
                <div className="text-xs text-muted">{app.model}</div>
              </div>
            </div>
          ))}
        </div>
      </Section>

      <Section title="Agent Productivity" color="text-sky-400">
        <div className="bg-surface rounded-lg border border-border overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="text-muted text-xs text-left border-b border-border">
              <th className="p-3">Agent</th><th className="p-3 mono">Done</th><th className="p-3 mono">Active</th><th className="p-3 mono">Todo</th>
            </tr></thead>
            <tbody>
              {Object.entries(AGENTS).map(([id,a])=>{
                const myIssues = issues.filter(i=>i.assigneeAgentId===id&&i.status!=='cancelled');
                const d = myIssues.filter(i=>i.status==='done').length;
                const act = myIssues.filter(i=>i.status==='in_progress').length;
                const t = myIssues.filter(i=>i.status==='todo').length;
                if(d+act+t===0)return null;
                return <tr key={id} className="border-b border-border/30">
                  <td className="p-3"><span className="font-medium">{a.name}</span><span className="text-muted text-xs ml-2">{a.role}</span></td>
                  <td className="p-3 mono text-emerald-400">{d}</td>
                  <td className="p-3 mono text-sky-400">{act}</td>
                  <td className="p-3 mono text-zinc-400">{t}</td>
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </Section>
    </div>
  );
}

// ── Shared Components ──
function Section({title,color,children}){
  return <div><h2 className={`text-sm font-semibold ${color||'text-zinc-400'} mb-3 uppercase tracking-wider`}>{title}</h2>{children}</div>;
}

function StatCard({label,value,sub}){
  return <div className="bg-surface rounded-xl border border-border p-4">
    <div className="text-muted text-xs uppercase tracking-wider">{label}</div>
    <div className="mono text-3xl font-bold mt-1">{value}</div>
    {sub && <div className="text-muted text-xs mt-1">{sub}</div>}
  </div>;
}

// ── Bottom Nav ──
const TABS = [
  {id:'inbox',label:'Inbox',icon:'M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z'},
  {id:'pipeline',label:'Pipeline',icon:'M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2'},
  {id:'portfolio',label:'Apps',icon:'M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z'},
  {id:'agents',label:'Team',icon:'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z'},
  {id:'money',label:'Money',icon:'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z'},
];

function NavIcon({d,active}){
  return <svg className={`w-6 h-6 ${active?'text-emerald-400':'text-muted'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth={active?2:1.5}><path strokeLinecap="round" strokeLinejoin="round" d={d}/></svg>;
}

// ── Create Issue Modal ──
function CreateIssueModal({onClose,onCreated}){
  const [title,setTitle]=useState('');
  const [desc,setDesc]=useState('');
  const [submitting,setSubmitting]=useState(false);

  const submit = async()=>{
    if(!title.trim())return;
    setSubmitting(true);
    try{
      await apiMutate('/issues',{title:title.trim(),description:desc.trim(),assigneeAgentId:CEO_ID,status:'todo'});
      onCreated();
      onClose();
    }catch(e){alert('Failed: '+e.message)}
    finally{setSubmitting(false)}
  };

  return(
    <div className="fixed inset-0 bg-black/80 z-50 flex items-end sm:items-center justify-center" onClick={onClose}>
      <div className="bg-surface w-full sm:max-w-lg sm:rounded-xl rounded-t-xl border border-border slide-up p-4 space-y-4" onClick={e=>e.stopPropagation()}>
        <div className="flex justify-between items-center">
          <h2 className="font-semibold text-lg">New Issue</h2>
          <button onClick={onClose} className="text-muted text-2xl p-2">&times;</button>
        </div>
        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Title" className="w-full bg-zinc-900 border border-border rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-emerald-700" autoFocus/>
        <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Description (optional)" rows={4} className="w-full bg-zinc-900 border border-border rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-emerald-700 resize-none"/>
        <div className="text-xs text-muted">Assigned to CEO (Matt) for delegation</div>
        <button onClick={submit} disabled={submitting||!title.trim()} className="w-full py-3 rounded-lg bg-emerald-900/60 text-emerald-300 border border-emerald-700 font-semibold text-sm min-h-[48px] disabled:opacity-50">{submitting?'Creating...':'Create Issue'}</button>
      </div>
    </div>
  );
}

// ── App ──
function App(){
  const {issues,agents,loading,error,lastRefresh,refresh} = useData();
  const [tab,setTab]=useState('inbox');
  const [selectedIssue,setSelectedIssue]=useState(null);
  const [toast,setToast]=useState(null);
  const [showCreate,setShowCreate]=useState(false);

  const handleAction = async(action,issue)=>{
    const statusMap = {start:'in_progress',done:'done',cancel:'cancelled'};
    const newStatus = statusMap[action];
    if(!newStatus)return;
    if(action==='cancel'&&!confirm(`Cancel "${issue.title}"?`))return;
    try{
      await api(`/issues/${issue.id}`,{method:'PATCH',body:JSON.stringify({status:newStatus}),headers:{'Origin':location.origin}});
      setToast({msg:`${issue.identifier} → ${newStatus}`,type:'success'});
      setSelectedIssue(null);
      refresh();
    }catch(e){
      setToast({msg:`Failed: ${e.message}`,type:'error'});
    }
  };

  const counts = useMemo(()=>{
    const active = issues.filter(i=>i.status==='in_progress'||i.status==='in_review').length;
    const todo = issues.filter(i=>i.status==='todo').length;
    return {inbox:active+todo};
  },[issues]);

  if(loading) return <div className="flex items-center justify-center h-screen"><div className="text-muted">Loading...</div></div>;
  if(error && issues.length===0) return <div className="flex items-center justify-center h-screen flex-col gap-4"><div className="text-red-400">Failed to connect</div><div className="text-xs text-muted">{error}</div><button onClick={refresh} className="px-4 py-2 rounded bg-surface border border-border text-sm">Retry</button></div>;

  return(
    <div className="min-h-screen pb-20">
      {/* Header */}
      <div className="sticky top-0 bg-bg/95 backdrop-blur-sm z-40 border-b border-border px-4 py-3">
        <div className="flex justify-between items-center max-w-4xl mx-auto">
          <div>
            <h1 className="font-bold text-lg">Tiven Labs</h1>
            <div className="text-xs text-muted flex items-center gap-2">
              {lastRefresh && <span>Updated {timeAgo(lastRefresh)}</span>}
              {error && <span className="text-red-400">Offline</span>}
              {agents.filter(a=>a.status==='running').length>0 && <span className="text-emerald-400">{agents.filter(a=>a.status==='running').length} running</span>}
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={()=>setShowCreate(true)} className="w-10 h-10 rounded-full bg-emerald-900/60 text-emerald-300 border border-emerald-700 flex items-center justify-center text-xl font-bold">+</button>
            <button onClick={refresh} className="w-10 h-10 rounded-full bg-surface border border-border flex items-center justify-center">
              <svg className="w-5 h-5 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
          </div>
        </div>
      </div>

      {/* Content */}
      <div className="max-w-4xl mx-auto px-4 py-4">
        {tab==='inbox' && <InboxView issues={issues} onSelect={setSelectedIssue} onAction={handleAction}/>}
        {tab==='pipeline' && <PipelineView issues={issues} onSelect={setSelectedIssue}/>}
        {tab==='portfolio' && <PortfolioView issues={issues} onSelect={setSelectedIssue}/>}
        {tab==='agents' && <AgentsView agents={agents} issues={issues} onSelect={setSelectedIssue}/>}
        {tab==='money' && <MoneyView issues={issues}/>}
      </div>

      {/* Bottom Nav */}
      <nav className="fixed bottom-0 left-0 right-0 bg-bg/95 backdrop-blur-sm border-t border-border z-40" style={{paddingBottom:'env(safe-area-inset-bottom,0)'}}>
        <div className="max-w-4xl mx-auto flex">
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 flex flex-col items-center py-2 pt-3 relative ${tab===t.id?'text-emerald-400':'text-muted'}`}>
              <NavIcon d={t.icon} active={tab===t.id}/>
              <span className="text-[10px] mt-0.5 font-medium">{t.label}</span>
              {t.id==='inbox'&&counts.inbox>0 && <span className="absolute top-1.5 right-1/2 translate-x-4 bg-red-500 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">{counts.inbox>9?'9+':counts.inbox}</span>}
            </button>
          ))}
        </div>
      </nav>

      {/* Modals */}
      {selectedIssue && <IssueModal issue={selectedIssue} onClose={()=>setSelectedIssue(null)} onAction={handleAction}/>}
      {showCreate && <CreateIssueModal onClose={()=>setShowCreate(false)} onCreated={refresh}/>}
      {toast && <Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
